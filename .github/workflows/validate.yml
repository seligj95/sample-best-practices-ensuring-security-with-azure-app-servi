name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Azure environment
        run: azd init -e sample-ci-${{ github.run_id }} -l eastus2 --no-prompt

      - name: Provision Azure resources
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt

      - name: Validate deployment
        run: |
          APP_URL=$(azd env get-values | grep "WEBAPP_URL" | awk '{print $2}')
          curl -sf $APP_URL -o /dev/null || exit 1

      - name: Cleanup resources
        if: always()
        run: azd down --force --purge --no-prompt