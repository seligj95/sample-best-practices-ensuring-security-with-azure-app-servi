name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize AZD Environment
        run: azd init -e sample-ci-${{ github.run_id }} -l eastus2 --no-prompt

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Validate Deployment
        run: |
          APP_URL=$(azd env get-values --query "WEBAPP_URL" -o tsv)
          curl -sf $APP_URL && echo "Validation successful!"

      - name: Cleanup Resources
        if: always()
        run: azd down --force --purge --no-prompt
