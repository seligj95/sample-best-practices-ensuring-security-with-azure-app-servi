name: Validate and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize AZD Environment
        run: azd init -e sample-ci-${{ github.run_id }} -l eastus2 --no-prompt

      - name: Provision Azure Resources
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Validate Deployment
        run: |
          APP_URL=$(azd env get-values --query "APP_SERVICE_URL" --output tsv)
          curl -sf $APP_URL || exit 1

      - name: Cleanup Resources
        if: always()
        run: azd down --force --purge --no-prompt