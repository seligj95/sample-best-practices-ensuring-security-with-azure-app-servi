name: Validate and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_ENV_NAME: sample-ci-${{ github.run_id }}
      AZURE_LOCATION: eastus2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize azd environment
        run: azd init -e $AZURE_ENV_NAME -l $AZURE_LOCATION --no-prompt

      - name: Provision Infrastructure
        run: azd provision --no-prompt

      - name: Deploy Application
        run: azd deploy --no-prompt

      - name: Validate Deployment
        run: |
          sleep 30
          APP_URL=$(azd env get-values 2>/dev/null | grep -i "endpoint\|url\|hostname" | head -1 | cut -d= -f2 | tr -d '"' || echo "")
          if [ -n "$APP_URL" ]; then
            echo "Testing $APP_URL"
            curl -sf "$APP_URL" || echo "Warning: endpoint returned non-200"
          else
            echo "No endpoint found — skipping URL validation"
          fi

      - name: Cleanup Resources
        if: always()
        run: azd down --force --purge --no-prompt || true
